<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mineralab</title>

    <!-- Favicon -->
    <link rel="icon" href="../Src/favicon.ico" type="image/x-icon">

    <!-- Fonte Rubik -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/Styles/feed.css">

    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

</head>

<body>


    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">

        <header class="hero-min">

            <div class="hero-content">

                <div class="hero-text">
                    <div>
                        <h3>Menu</h3>
                        <p>Opções de navegação</p>
                    </div>

                        <div id="closeSidebar" class="circle"> <i class="ph-bold ph-x"></i> </div>
                </div>

            </div>

        </header>

        <!-- AÇÕES -->
            <section class="actions-section">

                <div class="hero-text-bottom-grid">


                        <a href="../Exploração.html" class="btn"> <i class="ph-bold ph-moon"></i> Contraste </a>
                        <a href="../Exploração.html" class="btn"> <i class="ph-bold ph-chat-centered-text"></i> Feedbacks </a>
                        <a href="../Exploração.html" class="btn"> <i class="ph-bold ph-flask"></i> Laboratório </a>
                        <a href="../Exploração.html" class="btn"> <i class="ph-bold ph-info"></i> Projeto </a>

                    
                </div>

            </section>

        
    


    </div>










    <div class="container">

        <!-- CABEÇALHO -->
        <header class="hero-min">

            <div class="hero-content">

                <div class="hero-text">
                    <div>
                        <h3>Feedbacks</h3>
                        <p>Enviar melhorias</p>
                    </div>

                        <div id="openSidebar" class="circle"> <i class="ph-bold ph-list"></i> </div>
                </div>

            </div>

        </header>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="main-content">

            <section class="welcome-card-section">

                <div class="welcome-card-pt">

                    <form id="formContato">
                        <input type="text" id="nome" placeholder="Seu nome" required>

                        <input type="email" id="email" placeholder="Seu e-mail" required>

                        <textarea id="mensagem" rows="5" placeholder="Digite sua mensagem" required></textarea>

                        <div class="hero-text-bottom">
                            <button type="submit" class="circle-btn-sim"> <i class="ph-bold ph-arrow-up"></i></button>
                        </div>

                        
                    </form>


                    <div id="status"> </div>

                

                </div>
            

            </section>



    







            <!-- AÇÕES -->
            <section class="actions-section">

                

            </section>



        </main>

        

    </div>

























    <!-- JS -->
    <script src="/scripts.js" defer></script>



    <script>

emailjs.init("6EtjClHt4vLCaMCo1");

document
.getElementById("formContato")
.addEventListener("submit", function(e){

    e.preventDefault();

    const dados = {
        nome: document.getElementById("nome").value,
        email: document.getElementById("email").value,
        mensagem: document.getElementById("mensagem").value
    };

    emailjs.send(
        "service_mrsu1nl",
        "template_xpkmxpr",
        dados
    )
    .then(() => {
        document.getElementById("status").innerHTML =
            "Mensagem enviada com sucesso!";
        this.reset();
    })
    .catch((erro) => {
        document.getElementById("status").innerHTML =
            "Erro ao enviar.";
        console.error(erro);
    });

});

</script>


    

</body>

</html>
